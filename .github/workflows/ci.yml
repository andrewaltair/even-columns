name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: node --check extension.js
      - name: Package
        run: npx --yes @vscode/vsce package -o even-columns.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: even-columns-vsix
          path: even-columns.vsix
